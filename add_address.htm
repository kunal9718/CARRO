<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Address</title>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
    <style>
       .addaddressbox h2 {
           text-align: center;
           font-size: xx-large;
       }

       

        .mainaddress {
            padding-top: 12%;

        }


        .addaddressbox input[type="text"],
        input[type="number"] {
            display: block;
            margin: auto;
            border: none;
            border-radius: 4px;
            font-size: large;
            padding: 12px 20px;
            box-sizing: border-box;
            background-color: rgba(204, 204, 204, 0.398);
            color: rgb(107, 107, 107);
        }

        .addaddressbox input[type="submit"] {
            display: block;
            margin: auto;
            background-color: #666;
            padding: 12px 20px;
            font-size: large;
            font-weight: 600;
            color: #ccc;
            border-radius: 3px;
            border: none;
            box-shadow: none;
            width: 50%;
            margin-top: 14px;
            cursor: pointer;
        }

        .addaddressbox {

            display: block;
            margin: auto;
            width: 30%;
            border: solid 2px #666;
            box-shadow: 4px 4px 25px 8px #667;
            margin-bottom: 5%;
            border-radius: 20%;

        }
    </style>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="menu.css">
</head>

<body>
    <nav class="header"></nav>
    <script src="heading.js"></script>
    <div class="mainaddress">
        <div class="addaddressbox">
            <h2>Enter New Address</h2><br><br>
            <form>
                <input type="text" placeholder="House no and floor" size="30"><br><br>
                <input type="text" placeholder="locality" size="30"><br><br>
                <input type="text" placeholder="city" size="30"><br><br>
                <input type="text" placeholder="State" size="30"><br><br>
                <input type="text" pattern="[0-9]{6}" maxlength="6" minlength="6" placeholder="PIN CODE" min="100000"
                    inputmode="numeric" ><br><br>
                <input type="submit" value="submit">

            </form>
        </div>




        <nav class="footer"></nav>
        <script src="footer.js"></script>
    </div>
</body>

</html>
