<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">

    <style>
        h1 {
            text-align: right;
            color: black;
            font-family: Okra, Helvetica;
            text-align: center;
        }

        h3 {
            text-align: center;
            font-family: Okra, Helvetica;
        }


        .login_username,
        .login_password {
            display: block;
            margin: auto;
            border: none;
            border-radius: 4px;
            font-size: large;
            padding: 12px 20px;
            box-sizing: border-box;
            background-color: rgba(204, 204, 204, 0.398);
            color: rgb(107, 107, 107);


        }

        .login_submit,
        .signup_submit {
            display: block;
            margin: auto;
            background-color: #666;
            padding: 12px 20px;
            font-size: large;
            font-weight: 600;
            color: #ccc;
            border-radius: 3px;
            border: none;
            box-shadow: none;
            width: 50%;
            margin-top: 14px;
            cursor: pointer;
        }

        .forget_submit  {
            padding: auto;
            padding-left: 35%;
            font-weight: bold;
        }

        .loginpage {
            padding-top: 12%;
        }

        .loginimage {
            display: block;
            margin: auto;
            height: 100px;
            padding-bottom: 5px;
        }
        .loginbox {
            display: block;
            margin: auto;
            width: 30%;
            border: solid 2px #666;
            box-shadow:4px 4px 25px 8px #667;
            margin-bottom: 5%;
            border-radius: 20%;

        }
    </style>

</head>

<body>
    <nav class="header"></nav>
    <script src="heading.js"></script>




    <div class="loginpage">

        <nav class="loginbox"><br>
            <img class="loginimage" src="login.png" alt="">
            <h1>Have an account?</h1>
            <br>


            <form>
                <input class="login_username" type="text" size="25" maxlength="40" placeholder="Username or Mobile no."
                    required />
                <label><br></label>
                <input class="login_password" type="password" size="25" maxlength="40" placeholder="Password"
                    required />
                <br>
                <span class="forget_submit">


                <a href="#">Forgot password?</a></span>

                <input class="login_submit" type="submit" value="LOGIN">
                <br>
            </form>
            <input class="signup_submit" type="submit" value="SIGNUP" onclick="sign()">


            <br>
        </nav>
    </div>
    <nav class="footer"></nav>
    <script src="footer.js"></script>
    <script>
        function sign() {
            window.location.href = "signup.htm";

        }

    </script>
</body>

</html>
