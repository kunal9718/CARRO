<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="menu.css">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">

    <style>
        .Cart-Container {
            margin-top: 12%;
            margin-left: 20%;
            margin-bottom: 5%;
            box-shadow: 3px 4px 3px 4px rgb(19, 18, 18);
            width: 60%;
            height: 80%;
            overflow: hidden;
            background-color: white;
            border-radius: 4%;
            box-align: center;
            display: inline-flex;
            box-shadow: 0px 25px 40px #1687d933;
        }

        .shopping-cart {
            font-size: x-large;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
            margin-left: 38%;
            margin-top: 1.5%;
        }

        .remove-all {
            font-size: xx-large;

            margin-left: 35%;
            margin-top: 3%;

        }

        .checkout {
            font-size: x-large;
            margin-left: -24%;
            margin-top: 45.5%;
            margin-bottom: 3%;

            width: 20%;
            height: 40px;
            border: none;
            background: linear-gradient(to bottom right, #B8D7FF, #8EB7EB);
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-family: ‘Open Sans’;
            font-weight: 600;
            color: #202020;
        }
    </style>
</head>

<body>
    <nav class="header"></nav>
    <script src="heading.js"></script>
    <div class="Cart-Container">
        <div class="shopping-cart"> Shopping Cart</div>
        <div class="remove-all"><i class='fa fa-trash'></i></div>
        <button type="button" class="checkout"><a href="payment.htm">Checkout</a></button>
        <br>





    </div>


    <nav class="footer"></nav>
    <script src="footer.js"></script>
</body>

</html>
