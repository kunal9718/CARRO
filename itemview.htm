<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item view</title>
    <link rel="stylesheet" href="footer.css">
  <link rel="stylesheet" href="menu.css">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
    <style>
        .itemview_box {
            width: 40%;
            min-height: 350px;
            
            margin: 10px;
            padding: 10px;
            text-align: center;
            box-shadow: 5px 5px 5px 5px blue;
            float: left;
        }

        .price_box {
            width: 50%;
            min-height: 350px;
            
            margin: 10px;
            padding: 10px;
            
            float: right;
        }

        #item_name ,
        #item_price{
            text-align: left;
            font-family: Arial, Helvetica, sans-serif;
            font-size: xx-large;
            margin-left: 3%;
            margin: 3.5%;
        }

      

        input[type="submit"] {
            background-color: #4daea1;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 94%;
            margin-left: 3%;
            margin-top: 20%;
            
        }
        .itemview {
            padding-top: 12%;
        }
            
    </style>




</head>

<body>
   
    
    <nav class="header"></nav>
    <script src="heading.js"></script>
    <div class="itemview">
    
    <div class="itemview_box"><img scr="abc.jpg">image</div>
    <div class="price_box">
        <div id="item_name">item name</div>
        <div id="item_price">item price</div>
        <div id="item_addtocart"><input type="submit" value="Add To Cart"> </div>


    </div>









    <nav class="footer"></nav>
    <script src="footer.js"></script>
    </div>
</body>

</html>
