    <style>
        nav li {
            width: 20%;
            height: 40px;
            display: inline-block;
           
        }
        nav  a {
            text-decoration: none;
        }


        nav  ul  li {
            text-align: center;
        }

        nav  ul  li  ul {
            display: none;
            position: absolute;
            width: inherit;
            margin-top: 10px;

        }
        nav ul li ul a {
           padding-left: 50px;
           
       }

        nav li:hover ul {
            display: block;
        }

        nav li ul li {
            display: block;
            text-align: center;
        }
        

        #menubar {
            margin: 30px;
            text-align: center;
            font-size: x-large;
            display: inline;
        }
